name: gitleaks

# Escaneo de secretos en el historial de git. Usa el binario de gitleaks
# directamente (no la gitleaks-action, que exige licencia en cuentas de
# organización). Falla el CI si encuentra un secreto no allowlisteado.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historial completo para escanear todos los commits

      - name: Run gitleaks
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --redact --exit-code 1 --verbose
